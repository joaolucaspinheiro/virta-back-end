# Copy to application-secrets.properties and fill in your credentials.
# application-secrets.properties is in .gitignore and must never be committed.

spring.datasource.url=jdbc:mysql://localhost:3306/virta_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Base64 key to sign the JWTs (minimum 32 bytes / 256 bits)
# To generate: openssl rand -base64 32
api.security.token.secret=YOUR_BASE64_KEY_HERE
